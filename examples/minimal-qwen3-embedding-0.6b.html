<!DOCTYPE html>
<html>
<head>
  <title>Qwen3 Embedding 0.6B Transformers.js Demo</title>  
  <script type="module">
    import { 
      pipeline, 
      matmul, 
    } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@4.2.0';
    
    // Get a rough estemate of the whole system RAM
    const ramGB = navigator.deviceMemory;
    if (typeof ramGB !== "undefined") {
        // Variable exists
        console.log("Device has approximately " + ramGB + " GiB of RAM.");
    } else {
        // Variable does not exist or is undefined
        console.log("This browser does not support the API call 'navigator.deviceMemory'")
    } 
           
    
    // Check if page was refreshed
    window.addEventListener('load', () => {
        // Modern browsers: Check performance entries
        const navigationEntries = performance.getEntriesByType('navigation');
        if (navigationEntries.length > 0 && navigationEntries[0].type === 'reload') {
          console.log("Page was refreshed (F5 or Reload button)");
        }
        // Legacy fallback (deprecated but widely supported)
        // if (performance.navigation.type === 1) { console.log('Page was refreshed'); }
      });
    
    // Function to verify that suitable GPU adapter can be requested
    async function isWebGPUSupported() {
      if (!navigator.gpu) {
        return false;
      }
      try {
        const adapter = await navigator.gpu.requestAdapter();
        return !!adapter;
      } catch (error) {
        return false;
      }
    }
    
    // Function to check if WebGPU is available
    async function checkGPUselectConfig() {
    
      if (navigator.gpu) {
        // Verify GPU adapter
        const adapterGpu = await isWebGPUSupported();
        if (adapterGpu) {
          console.log("GPU adapter verification: " + adapterGpu + " - WebGPU is supported!");
          // Return WebGPU configuration in an Object (Default for WebGPU is half-precision)
          return {dtype: "fp16", device: "webgpu"}
        } else {
          console.log("GPU adapter verification: " + adapterGpu +  " - WebGPU is not supported!");
          // Return WASM configuration in an Object (Default for WASM is 8-bit quantization)
          return {dtype: "q8", device: "wasm"}
        }
      } else {
        console.log('Basic Check - WebGPU is not supported');
      }
    }

    // Create a feature extraction pipeline which matches the available hardware
    const llmcfg = await checkGPUselectConfig();
    const extractor = await pipeline(
      "feature-extraction",
      "onnx-community/Qwen3-Embedding-0.6B-ONNX",
      {
        dtype: llmcfg.dtype, // Options: "fp32", "fp16", "q8", "q4", "q4fp16"
        device: llmcfg.device,  // Options: "webgpu", "wasm"
      },
    );

    function get_detailed_instruct(task_description, query) {
      return `Instruct: ${task_description}\nQuery:${query}`;
    }

    // Each query must come with a one-sentence instruction that describes the task
    const task = "Given a web search query, retrieve relevant passages that answer the query";
    const queries = [
      get_detailed_instruct(task, "What is the capital of China?"),
      get_detailed_instruct(task, "Explain gravity"),
    ];

    // No need to add instruction for retrieval documents
    const documents = [
      "The capital of China is Beijing.",
      "Gravity is a force that attracts two bodies towards each other. It gives weight to physical objects and is responsible for the movement of planets around the sun.",
    ];
    const input_texts = [...queries, ...documents];

    // Extract embeddings for queries and documents
    const output = await extractor(input_texts, {
      pooling: "last_token",
      normalize: true,
    });
    const scores = await matmul(
      output.slice([0, queries.length]), // Query embeddings
      output.slice([queries.length, null]).transpose(1, 0), // Document embeddings
    );
    console.log(scores.tolist());
    
    // Unload the model after utilization, to free memory
    await extractor.dispose();
  </script>
</head>
<body>
  <p>Wird geladen...</p>
</body>
</html>
