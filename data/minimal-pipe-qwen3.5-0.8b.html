<!DOCTYPE html>
<html>
<head>
  <title>Qwen3.5 0.8B pipeline Transformers.js Demo</title>  
  <script type="module">

    import { pipeline, TextStreamer } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@4.2.0';

    const model_id = "huggingworld/Qwen3.5-0.8B-ONNX";
    
    // Get a rough estemate of the whole system RAM
    const ramGB = navigator.deviceMemory;
    if (typeof ramGB !== "undefined") {
        // Variable exists
        console.log("Device has approximately " + ramGB + " GiB of RAM.");
    } else {
        // Variable does not exist or is undefined
        console.log("This browser does not support the API call 'navigator.deviceMemory'")
    } 
           
    
    // Check if page was refreshed
    window.addEventListener('load', () => {
        // Modern browsers: Check performance entries
        const navigationEntries = performance.getEntriesByType('navigation');
        if (navigationEntries.length > 0 && navigationEntries[0].type === 'reload') {
          console.log("Page was refreshed (F5 or Reload button)");
        }
        // Legacy fallback (deprecated but widely supported)
        // if (performance.navigation.type === 1) { console.log('Page was refreshed'); }
      });
    
    // Function to verify that suitable GPU adapter can be requested
    async function isWebGPUSupported() {
      if (!navigator.gpu) {
        return false;
      }
      try {
        const adapter = await navigator.gpu.requestAdapter();
        return !!adapter;
      } catch (error) {
        return false;
      }
    }
    
    // Function to check if WebGPU is available
    async function checkGPUselectConfig() {
    
      if (navigator.gpu) {
        console.log('Basic Check - WebGPU is available');
        // Verify GPU adapter
        const adapterGpu = await isWebGPUSupported();
        if (adapterGpu) {
          console.log("GPU adapter verification: " + adapterGpu + " - WebGPU is supported!");
          // Return WebGPU configuration in an Object (Default for WebGPU is half-precision)
          return {embed_tokens: "fp16", vision_encoder: "fp16", decoder_model_merged: "fp16", device: "webgpu"}
        } else {
          console.log("GPU adapter verification: " + adapterGpu +  " - WebGPU is not supported!");
          // Return WASM configuration in an Object (Default for WASM is 8-bit quantization)
          return {embed_tokens: "q4", vision_encoder: "fp16", decoder_model_merged: "q4", device: "wasm"}
        }
      } else {
        console.log('Basic Check - WebGPU is not supported');
      }
    }

    // Create a feature extraction pipeline which matches the available hardware
    const llmcfg = await checkGPUselectConfig();
    // 1. Initialize the pipeline
    const pipe = await pipeline("text-generation", model_id, {
      dtype: {
        embed_tokens: llmcfg.embed_tokens,
        vision_encoder: llmcfg.vision_encoder,
        decoder_model_merged: llmcfg.decoder_model_merged,
      },
      device: llmcfg.device,
    });

    // 2. Prepare conversational inputs
    const url = "https://huggingface.co/huggingworld/Qwen3.5-0.8B-ONNX/resolve/main/images/demo.jpeg";
    const messages = [
      {
        role: "system", 
        content: [ 
          { type: "text", text: "You are a helpful assistant." },
        ],
        role: "user",
        content: [
          { type: "text", text: "Write me a poem about Machine Learning in less than 6 lines." },
        ],
      },
    ];

    // 3. Set up the streamer
    const streamer = new TextStreamer(pipe.tokenizer, {
      skip_prompt: true,
      // I set this to true to match the skip_special_tokens preference from your original batch_decode step.
      skip_special_tokens: true, 
    });

    // 4. Generate the output
    const outputs = await pipe(messages, {
      max_new_tokens: 512,
      streamer: streamer,
    });

    // Note: The TextStreamer will log the response to the console in real-time.
    // The final decoded string is also returned in the outputs array:
    console.log(outputs)
    console.log("---")
    console.log(outputs[0].generated_text[1].content);
    
    // Unload the model after utilization, to free memory
    await pipe.dispose();
  </script>
</head>
<body>
  <p>Wird geladen...</p>
</body>
</html>
